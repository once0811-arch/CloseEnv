name: Bug Report
description: Report a CloseEnv bug or unexpected scan result.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste live secrets. Use fake values or detector names only.
  - type: input
    id: version
    attributes:
      label: CloseEnv version
      placeholder: closeenv 0.1.0
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Use synthetic files and fake values only.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: OS, shell, Rust version, Git version
